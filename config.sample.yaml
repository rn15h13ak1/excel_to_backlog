# ============================================================
# Excel → Backlog 課題登録ツール 設定ファイル
# ============================================================
# このファイルをコピーして config.yaml を作成してください。
# config.yaml は .gitignore で除外されています（API キーを含むため）。
#
#   cp config.sample.yaml config.yaml
# ============================================================

# ------------------------------------------------------------
# Backlog 接続設定
# ------------------------------------------------------------
backlog:
  space_host: "yourcompany.backlog.com"  # スペースのホスト名
  api_key: "YOUR_API_KEY_HERE"           # Backlog API キー
  project_key: "YOUR_PROJECT_KEY"        # プロジェクトキー（例: MYPROJ）
  ssl_verify: true                       # SSL 証明書検証（オンプレ版で false にする場合あり）
  base_path: ""                          # オンプレ版でパスプレフィックスがある場合（例: "/backlog"）

# ------------------------------------------------------------
# Excel ソース定義（複数指定可）
# ------------------------------------------------------------
sources:

  # ---- ソース例1: シンプルな1行ヘッダーの管理表 ----
  - name: "タスク管理表"              # ソースの識別名（--source オプションで指定可）
    excel:
      # path のパス区切り文字について:
      #   Windows: バックスラッシュ(\)はYAMLでエスケープ文字になるため、以下のいずれかで記述
      #     シングルクォート: path: 'C:\Users\username\Documents\task_list.xlsx'
      #     スラッシュ:       path: "C:/Users/username/Documents/task_list.xlsx"
      #   Mac/Linux: スラッシュ(/)をそのまま使用可
      path: 'C:\Users\username\Documents\task_list.xlsx'  # ← Windowsの場合の例
      sheet: "Sheet1"                 # シート名（省略時: 最初のシート）
      header_start_row: 1             # ヘッダー開始行（1始まり）
      header_end_row: 1               # ヘッダー終了行（1行ヘッダーなら start と同じ値）
      data_start_row: 2               # データ開始行
      col_start: "A"                  # 読み込み開始列
      col_end: "H"                    # 読み込み終了列

    # ----------------------------------------------------------------
    # 抽出条件の指定方法
    # ----------------------------------------------------------------
    # [filters]  複数条件を AND 評価（省略時は全行が対象）
    #   value  : 単一値との完全一致
    #   values : 複数値のいずれかに一致（OR 条件）
    #   match  : "exact"（デフォルト）/ "contains" / "startswith"
    #
    # [filter_groups]  グループ内は AND、グループ間は OR で評価
    #   複合キー（例: 項番+枝番 のペア）で特定行を指定したい場合に使用
    #   filters と filter_groups が両方指定された場合は filter_groups を優先
    # ----------------------------------------------------------------

    # --- filters 方式（AND 評価）---
    filters:
      - col_name: "ステータス"        # Excel のヘッダー名
        value: "未着手"               # 単一値と完全一致する行を抽出
        # match: "exact"             # "exact"（デフォルト）/ "contains" / "startswith"
      # - col_name: "ステータス"
      #   values: ["未着手", "対応中"]   # 複数値のいずれかに一致（OR）

    # --- filter_groups 方式（複合キーで特定行をペア指定）---
    # filter_groups:
    #   - filters:                     # グループ1: 項番=1 かつ 枝番=A
    #       - col_name: "項番"
    #         value: "1"
    #       - col_name: "枝番"
    #         value: "A"
    #   - filters:                     # グループ2: 項番=3 かつ 枝番=B
    #       - col_name: "項番"
    #         value: "3"
    #       - col_name: "枝番"
    #         value: "B"

    # Backlog 課題へのマッピング設定
    issue_mapping:
      issue_type: "タスク"            # 種別名（Backlog プロジェクトの種別と一致する必要あり）
      priority: "中"                  # 優先度名: 最高 / 高 / 中 / 低

      # ----------------------------------------------------------------
      # {{列名}} で参照できる特殊メタキー（Excel列名と同様に使用可能）
      # ----------------------------------------------------------------
      # _source_name  : このソースの name 値
      # _excel_path   : excel.path の値
      # _excel_sheet  : excel.sheet の値
      #
      # 例: summary_template: "【{{_source_name}}】{{タスク名}}"
      #     description_template に "ソース: {{_excel_path}}" と書いても使える
      # ----------------------------------------------------------------

      # 件名の指定方法: summary_col か summary_template のどちらか一方を設定する
      summary_col: "タスク名"         # 1列の値をそのまま件名にする場合
      # summary_template: "【{{_source_name}}】{{タスク名}}（{{担当者}}）"
      #                               # {{列名}} で複数列・メタキーを組み合わせる場合（summary_col より優先）
      #
      # ---- 条件ブロック {{#列名}}...{{/列名}} -------------------------
      # 指定列の値が空でなければブロック内を出力し、空の場合は出力しない。
      # セパレーターやプレフィックスを「値がある場合のみ表示」したいときに使用。
      #
      # 例: 項番=1, 枝番=A → "項番1-A"
      #     項番=2, 枝番="" → "項番2"  （ハイフン・枝番ともに出力しない）
      # summary_template: "項番{{項番}}{{#枝番}}-{{枝番}}{{/枝番}}"

      # ----------------------------------------------------------------
      # 本文（description）の生成方式: "template" または "auto"
      # ----------------------------------------------------------------
      # [template] description_template に記述したMarkdownを使用（デフォルト）
      #   {{列名}} の部分がセル値に置換される
      #   特殊プレースホルダー {{auto}} を使うと auto 方式の出力を任意の位置に展開できる
      #   → auto 出力にヘッダー・フッターを追加したい場合はこの方法を使う
      #
      # [auto] excel_md_tool と同じ形式で全列を自動変換
      #   列名が # 見出し、セル値が本文になる
      #   複数行ヘッダー（" / " 区切り）は階層見出しに変換（1段目=#, 2段目=##）
      #   セル内改行は <br> に変換、空セルは「（値なし）」を出力
      # ----------------------------------------------------------------

      # --- template 方式（デフォルト）---
      description_format: "template"
      description_template: |        # 詳細欄テンプレート。{{列名}} でセル値を埋め込み
        ## 概要
        {{概要}}

        ## 対応内容
        {{対応内容}}

        ## 備考
        {{備考}}

      # --- template 方式 + {{auto}} でヘッダー・フッターを付加する例 ---
      # description_format: "template"
      # description_cols:              # {{auto}} 展開時に出力する列（省略時は全列）
      #   - "概要"
      #   - "対応内容"
      #   - "備考"
      # description_template: |
      #   担当: {{担当者}} / 期限: {{期限日}}
      #
      #   {{auto}}
      #
      #   ---
      #   ※このチケットは自動生成されました。

      # --- auto 方式（excel_md_tool と同じ形式）---
      # description_format: "auto"
      # description_cols:              # 出力する列を絞る場合に指定（省略時は全列）
      #   - "概要"
      #   - "対応内容"
      #   - "備考"

      # 期限日・開始日の指定方法:
      #   列名のみ  : その列の値をそのまま日付として使う（YYYY/MM/DD または YYYY-MM-DD 形式）
      #   {{列名}}記法: テンプレート展開した結果を日付として使う（複数列の組み合わせや固定値の混在が可能）
      #   ※ 展開結果が日付形式（YYYY/MM/DD か YYYY-MM-DD）でない場合はそのフィールドをスキップ
      due_date_col: "期限日"          # 列名で指定する場合
      # due_date_col: "{{年度}}/03/31"              # 年度列 + 固定の月日で組み立てる例
      # due_date_col: "{{終了年}}/{{終了月}}/{{終了日}}"  # 複数列から組み立てる例
      # start_date_col: "開始日"      # 開始日列名（任意）
      assignee_col: "担当者"          # 担当者列名（Backlog の表示名 or ログインID と一致する必要あり）

      # ステータスのコントロール（任意）
      # status_col に Excel のステータス列名を指定し、
      # status_map で Excel の値と Backlog のステータス名を対応付ける。
      # status_map に存在しない値はスキップ（警告を出力）し、ステータスを変更しない。
      # Backlog のステータス名はプロジェクト設定で確認してください（例: 未対応/処理中/処理済み/完了）。
      # status_col: "ステータス"
      # status_map:
      #   "未着手": "未対応"
      #   "対応中": "処理中"
      #   "確認待ち": "処理済み"
      #   "完了": "完了"

      # 必須列チェック（任意）
      # リスト内のいずれか1列でも空の行はスキップする（作成・更新ともに対象外）。
      # 項番だけ記載されてその他が未入力の行を除外したい場合などに使用。
      # required_cols:
      #   - "タスク名"
      #   - "対応内容"

      # カスタム属性へのマッピング（任意）
      # custom_fields:
      #   - field_name: "カテゴリ"    # Backlog のカスタム属性名
      #     col_name: "分類"          # Excel の列名

    # 重複チェック・更新設定
    upsert:
      enabled: false                  # true: 既存課題を更新 / false: 常に新規作成
      # 重複判定方法（enabled: true の場合、どちらか一方を設定）
      # key_col: "Backlog課題番号"    # Excel にissueKey（例: PROJ-123）を書いた列
      # match_summary: true           # 件名が一致する課題を検索して更新

  # ---- ソース例2: 2行ヘッダーの管理表 ----
  - name: "問い合わせ管理表"
    excel:
      path: 'C:\Users\username\Documents\inquiry_list.xlsx'  # ← Windowsの場合の例
      sheet: "問い合わせ一覧"
      header_start_row: 2             # 2行目からヘッダー
      header_end_row: 3               # 3行目まで（2行ヘッダー → " / " で結合）
      data_start_row: 4
      col_start: "B"
      col_end: "J"
    filters:
      - col_name: "対応状況"
        value: "未対応"
    issue_mapping:
      issue_type: "要望"
      priority: "高"
      summary_col: "件名 / タイトル"  # 複数行ヘッダーは " / " 区切りで指定
      description_template: |
        ## 問い合わせ内容
        {{内容 / 詳細}}

        ## 受付日
        {{受付日}}
      assignee_col: "担当者 / 氏名"
      custom_fields:
        - field_name: "問い合わせ種別"
          col_name: "種別 / カテゴリ"
    upsert:
      enabled: true
      key_col: "Backlog番号"          # Excel のこの列に issueKey があれば更新、なければ新規作成
